<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" width="1400" height="360" role="img" aria-label="CEREBRAL">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff4d2e" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#ff4d2e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff4d2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8a8a8a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="360" fill="url(#bg)"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <ellipse cx="700" cy="180" rx="560" ry="220" fill="url(#glow)"/>
  <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', monospace" fill="#5a5a5a" font-size="12" letter-spacing="2">
    <text x="40" y="42">● cerebral.work</text>
    <text x="1360" y="42" text-anchor="end">v0.1 / mmxxvi</text>
    <text x="40" y="330">© cerebral</text>
    <text x="1360" y="330" text-anchor="end">cognition / as infrastructure</text>
  </g>
  <text x="700" y="210" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="150" font-weight="900" fill="url(#wm)" text-anchor="middle" letter-spacing="-6">CEREBRAL</text>
</svg>
